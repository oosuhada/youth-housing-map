<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>LH 청년 매입임대 — 맞춤 점수 지도</title>
<link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"/>
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:'Apple SD Gothic Neo',sans-serif;background:#f5f5f3;display:flex;flex-direction:column;height:100vh;overflow:hidden}

/* 헤더 */
#header{background:#fff;border-bottom:1px solid #e5e5e3;padding:12px 20px;display:flex;align-items:center;gap:12px;flex-shrink:0}
#header h1{font-size:15px;font-weight:600;color:#1a1a1a}
#total-count{font-size:12px;color:#999;margin-left:auto}

/* 탭 */
#tabs{display:flex;background:#fff;border-bottom:1px solid #e5e5e3;flex-shrink:0}
.tab{flex:1;padding:10px;font-size:13px;font-weight:500;color:#888;text-align:center;cursor:pointer;border-bottom:2px solid transparent;transition:all 0.15s}
.tab.on{color:#185FA5;border-bottom-color:#185FA5}

/* 패널 공통 */
.panel{flex:1;overflow:hidden;display:none;flex-direction:column}
.panel.on{display:flex}

/* 사이드바 + 지도 레이아웃 */
#map-panel{flex-direction:row}
#sidebar{width:300px;flex-shrink:0;overflow-y:auto;background:#fff;border-right:1px solid #e5e5e3;display:flex;flex-direction:column}
#map-wrap{flex:1}
#map{width:100%;height:100%}

/* 가중치 슬라이더 영역 */
#weights{padding:14px 16px;border-bottom:1px solid #f0f0ee}
#weights h2{font-size:12px;font-weight:600;color:#999;letter-spacing:.05em;text-transform:uppercase;margin-bottom:10px}
.w-row{display:flex;align-items:center;gap:8px;margin-bottom:8px}
.w-label{font-size:12px;color:#444;width:68px;flex-shrink:0}
.w-row input[type=range]{flex:1;accent-color:#185FA5;height:3px;cursor:pointer}
.w-val{font-size:12px;font-weight:600;color:#185FA5;width:28px;text-align:right}
#weight-sum{font-size:11px;color:#999;margin-top:4px;text-align:right}
#weight-sum.over{color:#E24B4A}

/* 지도 핀 리스트 */
#pin-list{overflow-y:auto;flex:1}
.pin-item{padding:10px 14px;border-bottom:1px solid #f0f0ee;cursor:pointer;transition:background 0.1s}
.pin-item:hover{background:#f8f8f7}
.pin-item.active{background:#EBF4FD}
.pin-rank{font-size:11px;font-weight:700;color:#fff;background:#185FA5;border-radius:4px;padding:1px 5px;margin-right:6px}
.pin-name{font-size:13px;font-weight:500;color:#1a1a1a}
.pin-score{font-size:12px;font-weight:700;margin-top:3px}
.pin-meta{font-size:11px;color:#999;margin-top:2px}

/* 랭킹 패널 */
#rank-panel{overflow-y:auto;padding:16px}
#rank-panel h2{font-size:13px;font-weight:600;color:#555;margin-bottom:12px}
table{width:100%;border-collapse:collapse;font-size:12px;background:#fff;border-radius:8px;overflow:hidden;border:1px solid #e5e5e3}
th{background:#f8f8f7;color:#666;font-weight:600;padding:8px 10px;text-align:left;border-bottom:1px solid #e5e5e3;white-space:nowrap}
td{padding:8px 10px;border-bottom:1px solid #f5f5f3;vertical-align:middle}
tr:last-child td{border-bottom:none}
tr:hover td{background:#f8fbff}
.rank-no{font-weight:700;color:#185FA5;font-size:13px}
.score-bar-wrap{display:flex;align-items:center;gap:6px}
.score-bar{height:6px;border-radius:3px;background:#185FA5;min-width:4px;transition:width 0.3s}
.score-text{font-weight:700;font-size:12px;white-space:nowrap}
.tag{font-size:10px;padding:2px 6px;border-radius:99px;background:#f0f0ef;color:#555}
.tag.elev-y{background:#E1F5EE;color:#085041}
.tag.elev-n{background:#FCEBEB;color:#791F1F}

/* 팝업 */
.popup-box{font-family:'Apple SD Gothic Neo',sans-serif;min-width:220px}
.popup-score{font-size:20px;font-weight:700;margin-bottom:4px}
.popup-name{font-size:13px;font-weight:600;color:#1a1a1a;margin-bottom:3px}
.popup-addr{font-size:11px;color:#888;margin-bottom:8px;line-height:1.5}
.popup-divider{border:none;border-top:1px solid #eee;margin:6px 0}
.popup-grid{display:grid;grid-template-columns:1fr 1fr;gap:4px}
.popup-item{font-size:11px;background:#f5f5f3;border-radius:4px;padding:4px 7px}
.popup-item span{display:block;color:#999;font-size:10px;margin-bottom:1px}
.popup-bars{margin-top:8px}
.pbar-row{display:flex;align-items:center;gap:6px;margin-bottom:4px}
.pbar-label{font-size:10px;color:#888;width:55px;flex-shrink:0}
.pbar-track{flex:1;height:5px;background:#eee;border-radius:3px;overflow:hidden}
.pbar-fill{height:100%;border-radius:3px;background:#185FA5;transition:width 0.3s}
.pbar-val{font-size:10px;color:#185FA5;font-weight:600;width:24px;text-align:right}
</style>
</head>

      <div class="w-row"><span class="w-label">생활반경</span><input type="range" id="w-life" min="0" max="50" value="35" step="5"><span class="w-val" id="wv-life">35</span></div>
      <div id="weight-sum">합계: 100%</div>
    </div>
    <div id="pin-list"></div>
  </div>
  <div id="map-wrap"><div id="map"></div></div>
</div>

<div id="rank-panel" class="panel">

];

// 정규화 헬퍼
function normalize(val, min, max, invert=false) {
  if (max === min) return 5;
  const n = (val - min) / (max - min) * 10;
  return invert ? 10 - n : n;
}

const areaMin  = Math.min(...houses.map(h=>h.area)),  areaMax  = Math.max(...houses.map(h=>h.area));
const stMin    = Math.min(...houses.map(h=>h.stDist)), stMax    = Math.max(...houses.map(h=>h.stDist));
const lifeVals = houses.map(h=>(h.dAirport+h.dSongpa+h.dGangdong)/3);
const lifeMin  = Math.min(...lifeVals), lifeMax = Math.max(...lifeVals);

function calcScores(wArea, wRooms, wStation, wLife) {
  const total = wArea + wRooms + wStation + wLife || 1;
  return houses.map((h,i) => {
    const sArea    = normalize(h.area, areaMin, areaMax) * (wArea/total);
    const sRooms   = (h.rooms===1?0:h.rooms===2?5:10) * (wRooms/total);
    const sStation = normalize(h.stDist, stMin, stMax, true) * (wStation/total);
    const sLife    = normalize(lifeVals[i], lifeMin, lifeMax, true) * (wLife/total);
    const score    = Math.round((sArea+sRooms+sStation+sLife)*10)/10;
    return {...h, score, sArea:+sArea.toFixed(1), sRooms:+sRooms.toFixed(1), sStation:+sStation.toFixed(1), sLife:+sLife.toFixed(1), lifeAvg:+lifeVals[i].toFixed(1)};
  }).sort((a,b)=>b.score-a.score);
}

function scoreColor(score) {
  const t = score/10;
  const r = Math.round(30  + (226-30)*  (1-t));
  const g = Math.round(95  + (158-95)*  t);
  const b = Math.round(200 + (30 -200)* t);
  return `rgb(${r},${g},${b})`;
}

let W = {area:20, rooms:15, station:30, life:35};

L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png',{attribution:'© OpenStreetMap',maxZoom:19}).addTo(map);

let markers = {}, activeNo = null;

function makeIcon(score, rank) {
  const c = scoreColor(score);
  return L.divIcon({
    className:'',
    html:`<div style="position:relative;width:32px;height:32px">

    </div>`,
    iconSize:[32,32],iconAnchor:[16,16],popupAnchor:[0,-20]
  });
}

function buildPopup(h, rank) {

  return `<div class="popup-box">
    <div class="popup-score" style="color:${c}">${h.score.toFixed(1)}점 <span style="font-size:12px;color:#999;font-weight:400">(${rank}위)</span></div>
    <div class="popup-name">#${h.no} ${h.name}</div>
    <div class="popup-addr">${h.addr}</div>
    <hr class="popup-divider">
    <div class="popup-grid">
      <div class="popup-item"><span>전용면적</span>${h.area}㎡</div>
      <div class="popup-item"><span>방수</span>${h.rooms}개</div>
      <div class="popup-item"><span>층수</span>${h.floor}</div>
      <div class="popup-item"><span>승강기</span>${h.elev==='Y'?'있음':'없음'}</div>
      <div class="popup-item"><span>가까운 역</span>${h.station}역 ${(h.stDist*1000).toFixed(0)}m</div>
      <div class="popup-item"><span>생활반경 평균</span>${h.lifeAvg}km</div>
    </div>
    <div class="popup-bars">
      <div class="pbar-row"><span class="pbar-label">면적점수</span><div class="pbar-track"><div class="pbar-fill" style="width:${h.sArea*10}%"></div></div><span class="pbar-val">${h.sArea}</span></div>
      <div class="pbar-row"><span class="pbar-label">방수점수</span><div class="pbar-track"><div class="pbar-fill" style="width:${h.sRooms*10}%"></div></div><span class="pbar-val">${h.sRooms}</span></div>
      <div class="pbar-row"><span class="pbar-label">역세권점수</span><div class="pbar-track"><div class="pbar-fill" style="width:${h.sStation*10}%"></div></div><span class="pbar-val">${h.sStation}</span></div>
      <div class="pbar-row"><span class="pbar-label">생활반경점수</span><div class="pbar-track"><div class="pbar-fill" style="width:${h.sLife*10}%"></div></div><span class="pbar-val">${h.sLife}</span></div>
    </div>
  </div>`;
}

function renderMap(data) {
  Object.values(markers).forEach(m=>map.removeLayer(m));
  markers = {};
  data.forEach((h,i) => {
    const rank = i+1;
    const m = L.marker([h.lat,h.lng],{icon:makeIcon(h.score,rank)})
      .addTo(map)
      .bindPopup(buildPopup(h,rank),{maxWidth:300});
    markers[h.no] = m;
  });
}

function renderList(data) {
  const el = document.getElementById('pin-list');
  el.innerHTML = data.map((h,i)=>{
    const c = scoreColor(h.score);
    return `<div class="pin-item" data-no="${h.no}" onclick="focusPin(${h.no})">
      <div style="display:flex;align-items:center">
        <span class="pin-rank" style="background:${c}">${i+1}</span>
        <span class="pin-name">${h.name}</span>
      </div>
      <div class="pin-score" style="color:${c}">${h.score.toFixed(1)}점</div>
      <div class="pin-meta">${h.area}㎡ · 방${h.rooms} · ${h.station}역 ${(h.stDist*1000).toFixed(0)}m · 생활반경 ${h.lifeAvg}km</div>
    </div>`;
  }).join('');
}

function renderRankTable(data) {
  const wrap = document.getElementById('rank-table-wrap');
  const rows = data.map((h,i)=>{
    const c = scoreColor(h.score);
    const barW = Math.round(h.score/10*100);
    return `<tr>
      <td><span class="rank-no">${i+1}</span></td>
      <td style="font-weight:500;font-size:12px">#${h.no}<br><span style="color:#888;font-weight:400">${h.name}</span></td>
      <td><div class="score-bar-wrap"><div class="score-bar" style="width:${barW}px;background:${c}"></div><span class="score-text" style="color:${c}">${h.score.toFixed(1)}</span></div></td>
      <td>${h.area}㎡</td>
      <td>${h.rooms}개</td>
      <td>${h.station}역<br><span style="color:#999">${(h.stDist*1000).toFixed(0)}m</span></td>
      <td>${h.lifeAvg}km</td>
      <td>${h.floor}</td>
      <td><span class="tag ${h.elev==='Y'?'elev-y':'elev-n'}">${h.elev==='Y'?'있음':'없음'}</span></td>
    </tr>`;
  }).join('');
  wrap.innerHTML = `<table>
    <thead><tr><th>순위</th><th>매물</th><th>점수</th><th>면적</th><th>방수</th><th>가까운역</th><th>생활반경</th><th>층수</th><th>승강기</th></tr></thead>
    <tbody>${rows}</tbody>
  </table>`;
}

window.focusPin = function(no) {
  document.querySelectorAll('.pin-item').forEach(el=>el.classList.remove('active'));
  const el = document.querySelector(`.pin-item[data-no="${no}"]`);
  if(el) el.classList.add('active');
  const m = markers[no];
  if(m){ map.setView(m.getLatLng(),15); m.openPopup(); }
};

function refresh() {
  scored = calcScores(W.area, W.rooms, W.station, W.life);
  renderMap(scored);
  renderList(scored);
  renderRankTable(scored);
}

// 슬라이더
['area','rooms','station','life'].forEach(key => {
  const el = document.getElementById('w-'+key);
  const vEl = document.getElementById('wv-'+key);
  el.addEventListener('input', ()=>{
    W[key] = +el.value;
    vEl.textContent = W[key];
    const sum = W.area+W.rooms+W.station+W.life;
    const sumEl = document.getElementById('weight-sum');
    sumEl.textContent = '합계: '+sum+'%';
    sumEl.className = sum>100 ? 'over' : '';
    refresh();
  });
});

// 탭
document.querySelectorAll('.tab').forEach(tab=>{
  tab.addEventListener('click',()=>{
    document.querySelectorAll('.tab').forEach(t=>t.classList.remove('on'));
    document.querySelectorAll('.panel').forEach(p=>p.classList.remove('on'));
    tab.classList.add('on');
    document.getElementById(tab.dataset.tab).classList.add('on');
    if(tab.dataset.tab==='map-panel') setTimeout(()=>map.invalidateSize(),50);
  });
});

refresh();
</script>
</body>
</html>
